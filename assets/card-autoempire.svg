<svg viewBox="0 0 800 210" xmlns="http://www.w3.org/2000/svg" width="800" height="210">
  <defs>
    <linearGradient id="bgAE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020e1c"/>
      <stop offset="100%" stop-color="#04192e"/>
    </linearGradient>
    <linearGradient id="barAE" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0080aa"/>
    </linearGradient>
    <linearGradient id="btnAE" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7000ff"/>
    </linearGradient>
    <radialGradient id="glowAEBg" cx="80%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#020e1c" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowAE" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="iconGlowAE" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .cardAE { animation: slideInRight 0.85s cubic-bezier(0.16,1,0.3,1) both; animation-delay:0.15s; }
      @keyframes slideInRight {
        from { opacity:0; transform:translateX(90px); }
        to   { opacity:1; transform:translateX(0);    }
      }
      .crown { animation: crownFloat 3.5s ease-in-out infinite; transform-origin:82px 105px; }
      @keyframes crownFloat {
        0%,100% { transform:translateY(0)   scale(1);    }
        50%     { transform:translateY(-7px) scale(1.05); }
      }
      .shimmerAE { animation: shimmerAE 3s ease-in-out infinite 0.5s; }
      @keyframes shimmerAE {
        0%,100% { stroke-opacity:0.35; }
        50%     { stroke-opacity:0.9;  }
      }
      .newBadge { animation: newBadgePulse 1.8s ease-in-out infinite; }
      @keyframes newBadgePulse {
        0%,100% { opacity:0.85; }
        50%     { opacity:1; }
      }
      .circuit { animation: circuitFlow 2s ease-in-out infinite alternate; }
      @keyframes circuitFlow {
        from { stroke-opacity:0.15; }
        to   { stroke-opacity:0.5;  }
      }
      .orbitRing { animation: orbitSpin 10s linear infinite; transform-origin:82px 105px; }
      @keyframes orbitSpin { to { transform:rotate(360deg); } }
    </style>
  </defs>

  <g class="cardAE">
    <rect x="1" y="1" width="798" height="208" rx="18" fill="url(#bgAE)"/>
    <rect x="1" y="1" width="798" height="208" rx="18" fill="url(#glowAEBg)"/>
    <rect x="1" y="1" width="798" height="208" rx="18" fill="none"
          stroke="url(#btnAE)" stroke-width="1.5" class="shimmerAE"/>
    <rect x="1" y="1" width="7" height="208" rx="3" fill="url(#barAE)"/>
    <circle cx="540" cy="22" r="2"   fill="#00d4ff" opacity="0.6"/>
    <circle cx="575" cy="50" r="1.5" fill="#0090b8" opacity="0.5"/>
    <circle cx="555" cy="65" r="1"   fill="#00d4ff" opacity="0.4"/>
    <circle cx="605" cy="35" r="1.5" fill="#7000ff" opacity="0.4"/>
    <line x1="540" y1="22" x2="575" y2="50"  stroke="#00d4ff" stroke-width="0.8" class="circuit"/>
    <line x1="575" y1="50" x2="555" y2="65"  stroke="#00d4ff" stroke-width="0.8" class="circuit"/>
    <line x1="555" y1="65" x2="605" y2="35"  stroke="#7000ff" stroke-width="0.8" class="circuit"/>
    <circle cx="82" cy="105" r="54" fill="#030f1e" opacity="0.95"/>
    <circle cx="82" cy="105" r="54" fill="none" stroke="#00d4ff" stroke-width="1"   opacity="0.5"/>
    <circle cx="82" cy="105" r="44" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.25" stroke-dasharray="3 5" class="orbitRing"/>
    <text x="82" y="122" text-anchor="middle" font-size="44" class="crown" filter="url(#iconGlowAE)">👑</text>
    <rect x="152" y="24" width="48" height="24" rx="12" fill="#f0db4f"/>
    <text x="176" y="41" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" font-weight="bold" fill="#000">JS</text>
    <rect x="210" y="24" width="70" height="24" rx="12" fill="#00d4ff" opacity="0.9" class="newBadge"/>
    <text x="245" y="41" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" font-weight="bold" fill="#000">NEW ✨</text>
    <text x="152" y="90" font-family="'Courier New',monospace" font-size="30" font-weight="bold"
          fill="#00d4ff" filter="url(#glowAE)">AutoEmpire</text>
    <text x="152" y="115" font-family="'Courier New',monospace" font-size="14" fill="#67e8f9">Next-gen Automation · JavaScript</text>
    <text x="152" y="143" font-family="'Courier New',monospace" font-size="12" fill="#3a6a7a">Build your digital empire  ·  Automate everything  ·  Ship faster ⚡</text>
    <text x="152" y="178" font-family="'Courier New',monospace" font-size="14" fill="#fbbf24">★ 0 Stars</text>
    <text x="252" y="178" font-family="'Courier New',monospace" font-size="14" fill="#8892b0">⑂ 0 Forks</text>
    <text x="352" y="178" font-family="'Courier New',monospace" font-size="14" fill="#00d4ff">🚀 Just launched!</text>
    <rect x="600" y="80" width="178" height="46" rx="23" fill="#00d4ff" opacity="0.08"/>
    <rect x="600" y="80" width="178" height="46" rx="23" fill="none"
          stroke="url(#btnAE)" stroke-width="1.5" class="shimmerAE"/>
    <text x="689" y="109" text-anchor="middle" font-family="'Courier New',monospace"
          font-size="13" font-weight="bold" fill="#00d4ff">View Project →</text>
    <text x="600" y="163" font-family="'Courier New',monospace" font-size="11" fill="#1a3a4a">github.com/0wum0/AutoEmpire</text>
  </g>
</svg>
